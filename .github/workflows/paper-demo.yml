name: Paper Demo Scanner

on:
  schedule:
    - cron: "5 * * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: paper-demo
  cancel-in-progress: false

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: pip install --quiet ccxt pandas numpy requests

      - name: Run V1 - saf teknik
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          python paper_scanner.py \
            --coins BTC ETH SOL BNB XRP \
            --exchange mexc \
            --once

      - name: Run V2 - teknik + makro filtre
        run: |
          python paper_scanner_v2.py \
            --coins BTC ETH SOL BNB XRP \
            --exchange mexc \
            --once

      - name: Generate HTML dashboard
        run: python gen_dashboard.py

      - name: Persist paper state
        run: |
          git config user.name "paper-demo-bot"
          git config user.email "actions@github.com"
          for f in paper_state.json paper_trades.csv paper_signals.csv paper_summary.md \
                   paper_state_v2.json paper_trades_v2.csv paper_signals_v2.csv paper_summary_v2.md \
                   index.html; do
            [ -f "$f" ] && git add "$f" || true
          done
          if git diff --cached --quiet; then
            echo "Degisiklik yok, commit atlaniyor"
          else
            git commit -m "paper demo: $(date -u +%Y-%m-%dT%H:%MZ) tarama [skip ci]"
            git push
          fi
